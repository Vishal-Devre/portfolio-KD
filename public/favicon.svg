<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect width="60" height="60" x="2" y="2" rx="12" ry="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- K letter -->
  <text
    x="8"
    y="46"
    font-family="Space Grotesk, Outfit, Arial, sans-serif"
    font-size="34"
    font-weight="700"
    fill="url(#txt)"
    letter-spacing="-1"
  >KD</text>

  <!-- Bottom accent line -->
  <rect x="8" y="54" width="48" height="2.5" rx="1.25" fill="rgba(255,255,255,0.35)"/>
</svg>